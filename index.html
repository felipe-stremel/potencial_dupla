<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

</head>

<body>
    <header>
        <h1>Blog do vitinho</h1>
        <p>Vou compartilhar conhecimentos do mundo</p>
        <style>
            header {
                background-color: #183C63;
                color: #FFFFFF;
                text-align: center;
                max-width: 800px;
                margin: 0 auto;
                padding: 16px;
                border: 10px solid 
            }

            main {
                background-color: #0C0046;
                color: #FFFAE2;

            }

            article {
                display: flex;
            }

            img {
                width: 80px;
                height: 80px;
                border: 10px solid #FFFAE2
            }

            .artigo-autor {
                font-weight: bold;
            }
        </style>
    </header>

    <main>
        <article>
            <img src="Neymar.png"
                alt="Logotipo conceitual de tecnologia e educacao: um livro aberto de onde emerge um cérebro digital brilhante, cercado por ícones de Wi-Fi, circuitos e lâmpada de ideia. Cores em tons de azul e branco.">

            <div>
                <h2>Meu primeiro post</h2>
                <p class="artigo-autor">Por:Vitinho/p>
                <p>terry crews enforca Neymar Jr</p>
                <button>❤️<span>0</span></button>
                <button>👍<span>0</span></button>
            </div>
        </article>
        <article>
            <img src="Costa do marfim.png"
                alt="Costa do marfim contra croacia 4x2 costa do marfim ganha a copa do mundo 2026">

            <div>
                <h2>Meu segundo post</h2>
                <p class="artigo-autor">Por:Vitinho </p>
                <p>A Costa do marfim ganhou a copa do mundo!.</p>
                <button>❤️<span>0</span></button>
                <button>👍<span>0</span></button>
            </div>
        </article>

    </main>
</body>

<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClicado);
        function botaoClicado() {
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }
    });



</script>

</html>
